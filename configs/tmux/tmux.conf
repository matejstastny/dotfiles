# Matej Stastny | https://github.com/matejstastny/dotfiles

unbind C-b
set -g prefix `
bind ` send-prefix

# Keybindings --------------------------------------------------------------------------------

unbind r
bind r source-file ~/.config/tmux/tmux.conf \;
bind i run-shell 'if [ -x "$HOME/.tmux/plugins/tpm/bin/install_plugins" ]; then "$HOME/.tmux/plugins/tpm/bin/install_plugins" && "$HOME/.tmux/plugins/tpm/bin/update_plugins" all; else mkdir -p "$HOME/.tmux/plugins" && git clone --depth 1 https://github.com/tmux-plugins/tpm "$HOME/.tmux/plugins/tpm" && "$HOME/.tmux/plugins/tpm/bin/install_plugins"; fi'

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind n new-window -c "#{pane_current_path}"
bind g popup -d '#{pane_current_path}' -w 80% -h 80% -b rounded
bind P command-prompt -p "Pane title:" "select-pane -T '%%' ; set-window-option pane-border-status top"
bind W command-prompt -p "Window name:" "rename-window '%%' ; set-window-option automatic-rename off"
bind S run "~/.config/tmux/plugins/tmux-resurrect/scripts/save.sh" \; display-message "Session saved!"
bind q if-shell '[ "$(tmux list-windows | wc -l)" -gt 1 ]' kill-window 'display-message "Last window — use kill-session to exit"'
bind x kill-pane

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Config -------------------------------------------------------------------------------------

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -g set-titles on
set -g set-titles-string "#S / #W"

set -g history-limit 10000
set -g escape-time 0
set -g mouse on
set-hook -g client-detached "run 'mkdir -p ~/.local/share/tmux && tmux display-message -p \"#S\" > ~/.local/share/tmux/last-session'"

# Status bar — Catppuccin Mocha Noir --------------------------------------------------------
# base=#11111b  surface0=#313244  overlay0=#6c7086  text=#cdd6f4
# mauve=#cba6f7  pink=#f38ba8  green=#a6e3a1  peach=#fab387  lavender=#b4befe

set -g status-position bottom
set -g status-style "bg=default fg=#6c7086"
set -g status-justify centre

set -g status-left ' #[fg=#cba6f7,bold]#S#[fg=#45475a,nobold]  #[fg=#6c7086]#W '
set -g status-left-length 50

set -g status-right ' #(gitmux -cfg ~/.config/gitmux/config.yml "#{pane_current_path}") #[fg=#45475a]  #[fg=#6c7086]#{?#{E:SSH_CONNECTION},#{E:USER}@#H,#{E:USER}} '
set -g status-right-length 80
set -g status-interval 5

setw -g window-status-format         ' #[fg=#45475a]#I #[fg=#6c7086]#W '
setw -g window-status-current-format ' #[fg=#cba6f7,bold]#I #[fg=#cdd6f4,bold]#W '
setw -g window-status-separator      '#[fg=#313244] · '

set -g message-style "fg=#cba6f7 bg=default"

# Pane borders
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"
set -g pane-border-status off
set -g pane-border-format " #{pane_title} "

# Popups
set -g popup-style        'bg=#11111b'
set -g popup-border-style 'fg=#313244,bg=#11111b'
set -g popup-border-lines rounded

# Core plugins -------------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# State saving -------------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Session picker — Catppuccin Mocha Noir fzf colors -----------------------------------------

set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-preview-ratio '40%'
set -g @sessionx-window-height '55%'
set -g @sessionx-window-width '70%'
set -g @sessionx-additional-options "\
  --color=bg:#11111b,\
bg+:#1e1e2e,\
fg:#6c7086,\
fg+:#cdd6f4,\
border:#313244,\
separator:#313244,\
scrollbar:#313244,\
header:#6c7086,\
label:#6c7086,\
info:#6c7086,\
prompt:#cba6f7,\
pointer:#cba6f7,\
marker:#f38ba8,\
spinner:#cba6f7,\
hl:#cba6f7,\
hl+:#f38ba8\
  --border=rounded \
  --padding=1,2"

# KEEP ON END --------------------------------------------------------------------------------
run-shell 'if [ -x "$HOME/.tmux/plugins/tpm/tpm" ]; then "$HOME/.tmux/plugins/tpm/tpm"; else mkdir -p "$HOME/.tmux/plugins" && git clone --depth 1 https://github.com/tmux-plugins/tpm "$HOME/.tmux/plugins/tpm" && "$HOME/.tmux/plugins/tpm/tpm"; fi'
