# Matej Stastny | https://github.com/matejstastny/dotfiles

unbind C-b
set -g prefix `
bind ` send-prefix

# Keybindings --------------------------------------------------------------------------------

unbind r
bind r source-file ~/.config/tmux/tmux.conf \;
bind i run '~/.tmux/plugins/tpm/bin/install_plugins' \; \
       run '~/.tmux/plugins/tpm/bin/update_plugins all' \;

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind n new-window -c "#{pane_current_path}"
bind P command-prompt -p "Pane title:" "select-pane -T '%%' ; set-window-option pane-border-status top"
bind W command-prompt -p "Window name:" "rename-window '%%' ; set-window-option automatic-rename off"
bind S run "~/.config/tmux/plugins/tmux-resurrect/scripts/save.sh" \; display-message "Session saved!"
bind q kill-window
bind x kill-pane

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Config -------------------------------------------------------------------------------------

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

set -g set-titles on
set -g set-titles-string "#S / #W"

set -g history-limit 10000
set -g escape-time 0
set -g mouse on

# Status bar ---------------------------------------------------------------------------------

set -g status-position bottom
set -g status-style "bg=default fg=#555555"
set -g status-justify centre

set -g status-left ' #[fg=#BB9AF7,bold] #S #[fg=#3a3a3a,nobold] │ #[fg=#555555]#W '
set -g status-left-length 50

set -g status-right ' #(gitmux -cfg ~/.config/gitmux/config.yml "#{pane_current_path}") #[fg=#3a3a3a]│ #[fg=#888888]#{?#{E:SSH_CONNECTION},#{E:USER}@#H,#{E:USER}} '
set -g status-right-length 80
set -g status-interval 5

setw -g window-status-format ' #[fg=#3a3a3a]#I #[fg=#555555]#W '
setw -g window-status-current-format ' #[fg=#BB9AF7]#I #[fg=#E29BD8,bold]#W '
setw -g window-status-separator '#[fg=#3a3a3a] · '

set -g message-style "fg=#e0e0e0"
set -g pane-border-style "fg=#3a3a3a"
set -g pane-active-border-style "fg=#9B7FA8"
set -g pane-border-status off
set -g pane-border-format " #{pane_title} "

# Core plugins -------------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# State saving -------------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Session picker -----------------------------------------------------------------------------

set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-preview-ratio '40%'
set -g @sessionx-window-height '50%'
set -g @sessionx-window-width '70%'

# KEEP ON END --------------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
