# Matej Stastny | https://github.com/matejstastny/dotfiles

unbind C-b
set -g prefix `
bind ` send-prefix

# Keybindings --------------------------------------------------------------------------------

unbind r
bind r source-file ~/.config/tmux/tmux.conf \;
bind i run '~/.tmux/plugins/tpm/bin/install_plugins' \; \
       run '~/.tmux/plugins/tpm/bin/update_plugins all' \;

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind n new-window -c "#{pane_current_path}"
bind q kill-window
bind x kill-pane

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Config -------------------------------------------------------------------------------------

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

set -g set-titles on
set -g set-titles-string "#S / #W"

set -g history-limit 10000
set -g escape-time 0
set -g mouse on

# Status bar ---------------------------------------------------------------------------------

set -g status-position bottom
set -g status-style "fg=#888888"
set -g status-left " #[fg=#e0e0e0,bold]#S #[fg=#333333]| "
set -g status-left-length 30
set -g status-right ""
set -g status-right-length 20

setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=#e0e0e0,bold] #I:#W "
setw -g window-status-separator ""

set -g message-style "fg=#e0e0e0"
set -g pane-border-style "fg=#252525"
set -g pane-active-border-style "fg=#555555"

# Core plugins -------------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# State saving -------------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# KEEP ON END --------------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
