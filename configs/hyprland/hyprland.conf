# --------------------------------------------------------------------------------------------
# hyprland.conf - my Hyprland config
# --------------------------------------------------------------------------------------------
# Author: Matej Stastny
# License: MIT
# Link: https://github.com/matejstastny/dotfiles
# --------------------------------------------------------------------------------------------

# Monitor ----------------------------------------------------------------------------------
# Auto-detect: resolution, position, scale
monitor=,preferred,auto,1

# Startup ----------------------------------------------------------------------------------
exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Environment ------------------------------------------------------------------------------
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland,x11
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# Input ------------------------------------------------------------------------------------
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }
}

# General ----------------------------------------------------------------------------------
# Tokyo Night: bg=#1a1b26, blue=#7aa2f7, purple=#bb9af7, border_dim=#414868
general {
    gaps_in = 10
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(7aa2f7ff) rgba(bb9af7ff) 45deg
    col.inactive_border = rgba(41486888)
    layout = dwindle
    resize_on_border = true
}

# Decoration -------------------------------------------------------------------------------
decoration {
    rounding = 8

    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.17
    }

    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = rgba(1a1b2699)
    }
}

# Animations -------------------------------------------------------------------------------
animations {
    enabled = true

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOut, 0.65, 0, 0.35, 1

    animation = windows, 1, 7, easeOutQuint
    animation = windowsOut, 1, 5, easeInOut, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, easeOutQuint, slide
}

# Layouts ----------------------------------------------------------------------------------
dwindle {
    pseudotile = false
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
}

# Keybindings ------------------------------------------------------------------------------
# Mirroring Aerospace (alt-based keybindings)
$mod = ALT
$terminal = ghostty
$browser = firefox
$menu = rofi -show drun

# Apps (matching Aerospace)
bind = $mod, G, exec, $terminal
bind = $mod, F, exec, $browser
bind = $mod, D, exec, vesktop
bind = $mod, V, exec, code
bind = $mod, E, exec, thunar
bind = $mod SHIFT, RETURN, exec, $menu
bind = $mod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Window management
bind = $mod, Q, killactive
bind = $mod SHIFT, F, togglefloating
bind = $mod, RETURN, fullscreen
bind = $mod, P, pseudo

# Focus (arrow keys)
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Move window (matching Aerospace alt-shift-hjkl)
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# Resize (matching Aerospace alt-shift-minus/equal)
bind = $mod SHIFT, minus, resizeactive, -80 0
bind = $mod SHIFT, equal, resizeactive, 80 0

# Workspaces (matching Aerospace alt-1 through alt-0)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move to workspace (matching Aerospace alt-shift-1 through alt-shift-0)
bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT, 9, movetoworkspacesilent, 9
bind = $mod SHIFT, 0, movetoworkspacesilent, 10

# Navigate (matching Aerospace alt-tab)
bind = $mod, TAB, workspace, previous

# Mouse window management
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy

# Volume & brightness
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Reload / exit
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, E, exit

# Window rules -----------------------------------------------------------------------------
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, title:^(Picture-in-Picture)$
windowrule = float, class:^(org.gnome.Calculator)$
windowrule = float, class:^(thunar)$, title:^(File Operation Progress)$
