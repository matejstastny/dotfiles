add_newline = true
command_timeout = 2000

format = """$env_var$os$username$hostname$kubernetes$directory$git_branch$git_status$python$nodejs$rust$golang$java$kotlin$lua$ruby$php$swift$zig$dart$elixir$crystal$nim$scala$haskell$julia$ocaml$perl$erlang$c$dotnet$bun$deno$terraform$docker_context$package
$character
"""

[character]
success_symbol = "‚ēį‚éĮÔĄÖ"
error_symbol = "‚ēį‚éĮÔĄÖ"


[env_var]
symbol = "‚ē≠‚ēī"
variable = 'SHELL'
format = "$symbol"
disabled = false

# ---

[os]
format = '[$symbol](bold #DCD7BA) '
disabled = false

[os.symbols]
Windows = 'Óė™ '
Arch = 'ůį£á'
Ubuntu = 'ÔĆõ'
Macos = 'ůįÄĶ'
Unknown = 'ůį†•'

# ---

# Shows the username
[username]
style_user = 'yellow bold'
style_root = 'black bold'
format = '[//](#727169) [$user](#D73B3E) '
disabled = false
show_always = true

# Shows the hostname
[hostname]
ssh_only = false
format = '[//](#727169) [$hostname](bold #957FB8) '
disabled = false

# Shows current directory
[directory]
truncation_length = 0
truncation_symbol = ''
home_symbol = '~'
read_only = ' ÔÄ£ '
format = '[//](#727169) [$path]($style)[$read_only]($read_only_style) '
style = '#7FB4CA'


# Shows current git branch
[git_branch]
# symbol = 'Óģ°'
symbol = ''
format = '[//](#727169) [$symbol\[$branch\]]($style) '
style = 'bold #D73B3E'

# Shows current git status
[git_status]
disabled = true
format = '[ $all_status $ahead_behind]($style) '
style = 'bold #98BB6C'
conflicted = 'ūüŹ≥'
up_to_date = ''
untracked = 'ÔĒ© '
ahead = '‚á°${count}'
diverged = '‚áē‚á°${ahead_count}‚á£${behind_count}'
behind = '‚á£${count}'
stashed = 'Ô£Ė '
modified = 'ÔĀĄ '
staged = '[++\($count\)](green)'
renamed = 'Ť•Ā '
deleted = 'ÔÄĒ '

# Shows kubernetes context and namespace
[kubernetes]
format = 'via [ůĪÉĺ $context\($namespace\)](bold #957FB8) '
disabled = false

