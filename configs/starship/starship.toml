format = """\
[Ôò¡Ôò┤](fg:arrow)\
$username\
$os\
$git_branch\
(\
    at \
    $directory\
)\
$fill $cmd_duration $time\
(\
    via \
    $python\
    $conda\
    $nodejs\
    $c\
    $rust\
    $java\
)
[Ôò░ÔöÇ](fg:arrow)$character\
"""
# Add the modules you need

# Disable the blank line at the start of the prompt
add_newline = true

palette = "normal"

[palettes.normal]
arrow = "#7E9CD8"
os = "#7E9CD8"
os_admin = "#FF5D62"
directory = "#98BB6C"
time = "#9CABCA"
node = "#7AA89F"
git = "#FFA066"
git_status = "#DCD7BA"
python = "#E6C384"
conda = "#76946A"
java = "#D27E99"
rust = "#C0A36E"
clang = "#A3D4D5"
duration = "#E46876"
text_color = "#DCD7BA"
text_light = "#1F1F28"

[username]
style_user = 'bold os'
style_root = 'bold os_admin'
format = '[´îé $user](fg:$style) '
disabled = false
show_always = true

[os]
format = "on [($name)]($style) "
style = "bold blue"
disabled = true

[os.symbols]
Alpine = "´îÇ "
Arch = "´îâ "
Debian = "´îå "
EndeavourOS = "´åù "
Fedora = "´îè "
Linux = "´îÜ "
Macos = "´îé "
Manjaro = "´îÆ "
Mint = "´îÄ "
NixOS = "´îô "
openSUSE = "´îö "
Pop = "¯èú "
SUSE = "´îö "
Ubuntu = "´îø "
Windows = "´à║ "

[character]
success_symbol = "[´üí](fg:arrow)"
error_symbol = "[´üí](fg:red)"

[directory]
format = "[$path](bold $style)[$read_only]($read_only_style) "
truncation_length = 2
style = "fg:directory"
read_only_style = "fg:directory"
before_repo_root_style = "fg:directory"
truncation_symbol = "ÔÇª/"
truncate_to_repo = true
read_only = " ¯®Á "

[time]
disabled = true
format = "[¾▒æê $time]($style)"
time_format = "%H:%M"
style = "bold fg:time"


[cmd_duration]
disabled = true
format = "took [´ôú $duration]($style) "
style = "bold fg:duration"
min_time = 500

[git_branch]
format = "via [$symbol$branch]($style) "
style = "bold fg:git"
symbol = "¯£é "

[git_status]
format = '[ $all_status$ahead_behind ]($style)'
style = "fg:text_color bg:git"
disabled = true

[docker_context]
disabled = false
symbol = "´îê "

[package]
disabled = false

[fill]
symbol = " "

[nodejs]
format = "[ $symbol$version ]($style)"
style = "fg:node"
symbol = "¯£ÿ "
version_format = "${raw}"
disabled = false

[python]
disabled = false
format = '[ ${symbol}${pyenv_prefix}(${version})( \($virtualenv\)) ]($style)'
symbol = "¯ÿå "
version_format = "${raw}"
style = "fg:python"

[conda]
format = "[ $symbol$environment ]($style)"
style = "fg:conda"
ignore_base = false
disabled = false
symbol = "´äî "

[java]
format = "[ $symbol$version ]($style)"
style = "fg:java"
version_format = "${raw}"
symbol = "¯Ö¡ "
disabled = false

[c]
format = "[ $symbol($version(-$name)) ]($style)"
style = "fg:clang"
symbol = "¯ÿ× "
version_format = "${raw}"
disabled = false

[rust]
format = "[ $symbol$version ]($style)"
style = "fg:rust"
symbol = "¯Üï "
version_format = "${raw}"
disabled = false
