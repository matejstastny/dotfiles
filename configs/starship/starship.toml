format = """\
[ŌĢŁ’īé  ](fg:arrow)\
$username\
$os\
 $directory\
$git_branch\
$fill $cmd_duration $time\
(\
    $python\
    $conda\
    $nodejs\
    $c\
    $rust\
    $java\
)
[ŌĢ░](fg:arrow)$character\
"""
# Add the modules you need

# Disable the blank line at the start of the prompt
add_newline = true

palette = "normal"

[palettes.normal]
arrow = "#7E9CD8"
os = "#7E9CD8"
os_admin = "#FF5D62"
directory = "#997EBC"
time = "#9CABCA"
node = "#7AA89F"
git = "#F05257"
git_status = "#DCD7BA"
python = "#E6C384"
conda = "#76946A"
java = "#D27E99"
rust = "#C0A36E"
clang = "#A3D4D5"
duration = "#E46876"
text_color = "#DCD7BA"
text_light = "#1F1F28"

[username]
style_user = 'bold os'
style_root = 'bold os_admin'
format = '[$user](fg:$style) '
disabled = true
show_always = true

[os]
format = "on [($name)]($style) "
style = "bold blue"
disabled = true

[os.symbols]
Alpine = "’īĆ "
Arch = "’īā "
Debian = "’īå "
EndeavourOS = "’åŚ "
Fedora = "’īŖ "
Linux = "’īÜ "
Macos = "’īé "
Manjaro = "’īÆ "
Mint = "’īÄ "
NixOS = "’īō "
openSUSE = "’īö "
Pop = "ŅŖŻ "
SUSE = "’īö "
Ubuntu = "’īø "
Windows = "’ģ║ "

[character]
success_symbol = "[’üĪ](fg:arrow)"
error_symbol = "[’üĪ](fg:arrow)"

[directory]
format = "[$path](bold $style)[$read_only]($read_only_style) "
truncation_length = 2
style = "fg:directory"
read_only_style = "fg:directory"
before_repo_root_style = "fg:directory"
truncation_symbol = ""
truncate_to_repo = true
read_only = " Ņ®Ą "

[time]
disabled = true
format = "[¾▒æł $time]($style)"
time_format = "%H:%M"
style = "bold fg:time"


[cmd_duration]
disabled = true
format = "took [’ōŻ $duration]($style) "
style = "bold fg:duration"
min_time = 500

[git_branch]
format = "via [$symbol$branch]($style) "
style = "bold fg:git"
symbol = "Ņ£é "

[git_status]
format = '[ $all_status$ahead_behind ]($style)'
style = "fg:text_color bg:git"
disabled = true

[docker_context]
disabled = false
symbol = "’īł "

[package]
disabled = false

[fill]
symbol = " "

[nodejs]
format = "[ $symbol$version ]($style)"
style = "fg:node"
symbol = "Ņ£ś "
version_format = "${raw}"
disabled = false

[python]
disabled = false
format = '[ ${symbol}${pyenv_prefix}(${version})( \($virtualenv\)) ]($style)'
symbol = "Ņśå "
version_format = "${raw}"
style = "fg:python"

[conda]
format = "[ $symbol$environment ]($style)"
style = "fg:conda"
ignore_base = false
disabled = false
symbol = "’äī "

[java]
format = "[ $symbol$version ]($style)"
style = "fg:java"
version_format = "${raw}"
symbol = "Ņ£Ė "
disabled = false

[c]
format = "[ $symbol($version(-$name)) ]($style)"
style = "fg:clang"
symbol = "Ņś× "
version_format = "${raw}"
disabled = false

[rust]
format = "[ $symbol$version ]($style)"
style = "fg:rust"
symbol = "ŅÜŗ "
version_format = "${raw}"
disabled = false
