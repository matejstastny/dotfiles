### Font ###
font_family      JetBrainsMono Nerd Font Mono Regular
bold_font        JetBrainsMono Nerd Font Mono Bold
italic_font      JetBrainsMono Nerd Font Mono Italic
bold_italic_font JetBrainsMono Nerd Font Mono Bold
font_size        11.0

### Colors ###
background            #0f0f17
foreground            #e0e0e0
selection_background  #252538
selection_foreground  #e0e0e0

# Black
color0  #1a1a28
color8  #3a3a55

# Red
color1  #f14c4c
color9  #ff7070

# Green
color2  #7dcfb6
color10 #9adece

# Yellow
color3  #e5c07b
color11 #f0d090

# Blue
color4  #7aa2f7
color12 #91b4ff

# Magenta / Purple-Pink
color5  #bb9af7
color13 #e29bd8

# Cyan
color6  #7dcfb6
color14 #9adece

# White
color7  #c0c0d0
color15 #e0e0e0

cursor              #e29bd8
cursor_text_color   #0f0f17
cursor_blink_interval 0

url_color           #bb9af7
url_style           curly

### Window ###
window_padding_width  14
hide_window_decorations yes
background_opacity    0.82
dynamic_background_color no

### Tab bar ###
tab_bar_style             powerline
tab_powerline_style       slanted
tab_bar_min_tabs          2
active_tab_foreground     #0f0f17
active_tab_background     #bb9af7
active_tab_font_style     bold
inactive_tab_foreground   #666680
inactive_tab_background   #1a1a28
inactive_tab_font_style   normal

### Scrollback ###
scrollback_lines  20000

### Bell ###
enable_audio_bell no
visual_bell_duration 0

### Mouse ###
copy_on_select        yes
focus_follows_mouse   yes
strip_trailing_spaces smart

### Keyboard shortcuts ###
kitty_mod ctrl+shift

map kitty_mod+t  new_tab_with_cwd
map kitty_mod+w  close_tab
map kitty_mod+]  next_tab
map kitty_mod+[  previous_tab
map kitty_mod+enter new_window_with_cwd

### Shell integration ###
shell_integration enabled
