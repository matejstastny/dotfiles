# Matej Stastny | hyprland.conf

################
### MONITORS ###
################

monitor = eDP-1, 2560x1664@60, 0x0, 1.33

#################
### VARIABLES ###
#################

$terminal = kitty
$launcher  = rofi -show drun
$browser   = firefox
$mainMod   = ALT

#################
### AUTOSTART ###
#################

exec-once = swaybg -i /home/starlight/dotfiles/assets/wallpapers/wallpaper.png -m fill
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = /usr/libexec/kf6/polkit-kde-authentication-agent-1
exec-once=hyprlock || hyprctl dispatch exit

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,         24
env = XCURSOR_THEME,        Adwaita
env = HYPRCURSOR_SIZE,      24

# Wayland-native apps
env = GDK_BACKEND,          wayland,x11,*
env = QT_QPA_PLATFORM,      wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = MOZ_ENABLE_WAYLAND,   1
env = SDL_VIDEODRIVER,      wayland
env = ELECTRON_OZONE_PLATFORM_HINT, wayland

# Scaling — tell toolkits about the 1.5x factor
env = GDK_SCALE,            1.5
env = QT_SCALE_FACTOR,      1.5

env = XDG_SESSION_TYPE,     wayland
env = XDG_SESSION_DESKTOP,  Hyprland
env = XDG_CURRENT_DESKTOP,  Hyprland

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 5
    gaps_out = 10

    border_size = 2

    col.active_border   = rgba(bb9af7ee) rgba(e29bd8ee) 45deg
    col.inactive_border = rgba(2a2a3eaa)

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 8
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled      = true
        range        = 14
        render_power = 4
        color        = rgba(0a0a1288)
        offset       = 0 4
    }

    blur {
        enabled          = true
        size             = 5
        passes           = 3
        new_optimizations = true
        vibrancy         = 0.16
        noise            = 0.01
    }
}

animations {
    enabled = true

    bezier = swift,  0.77, 0,    0.175, 1
    bezier = linear, 0,    0,    1,     1
    bezier = ease,   0.25, 0.46, 0.45,  1

    animation = windows,    1, 4,  swift, slide
    animation = windowsIn,  1, 4,  swift, popin 80%
    animation = windowsOut, 1, 3,  swift, popin 80%
    animation = fade,       1, 3,  ease
    animation = border,     1, 8,  linear
    animation = workspaces, 1, 4,  swift, slide
    animation = layers,     1, 3,  swift
}

dwindle {
    pseudotile     = false
    preserve_split = true
    smart_split    = true
}

master {
    new_status = slave
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    vrr                     = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_options = ctrl:swap_lwin_lctl

    follow_mouse  = 1
    sensitivity   = 0

    repeat_rate   = 40
    repeat_delay  = 250

    touchpad {
        natural_scroll       = true
        scroll_factor        = 0.8
        tap-to-click         = true
        tap-and-drag         = true
        disable_while_typing = false
        clickfinger_behavior = true
    }
}

gestures {
    workspace_swipe_distance           = 250
    workspace_swipe_invert             = true
    workspace_swipe_min_speed_to_force = 15
    workspace_swipe_cancel_ratio       = 0.3
}

# 3-finger horizontal swipe to switch workspaces
gesture = 3, horizontal, workspace

device {
    name      = logitech-g502-x-plus-1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

# ── Applications ──────────────────────────────────────────────────────────────
bind = $mainMod,       return, exec, $terminal
bind = $mainMod,       space,  exec, $launcher
bind = $mainMod,       B,      exec, $browser
bind = $mainMod,       C,      exec, code
bind = $mainMod,       M,      exec, apple-music
bind = $mainMod,       V,      exec, vesktop
bind = $mainMod,       n,      exec, hyprltm-net

# ── Window management ─────────────────────────────────────────────────────────
bind = $mainMod,       W,      killactive
bind = $mainMod,       F,      fullscreen,      0
bind = $mainMod SHIFT, F,      fullscreen,      1
bind = $mainMod,       T,      togglefloating
bind = $mainMod,       P,      pin
bind = $mainMod CTRL,  Q,      exec, hyprlock
bind = $mainMod SHIFT, Q,      exec, systemctl suspend

# ── Focus (vim-style) ─────────────────────────────────────────────────────────
bind = $mainMod,       H,      movefocus, l
bind = $mainMod,       J,      movefocus, d
bind = $mainMod,       K,      movefocus, u
bind = $mainMod,       L,      movefocus, r

# Arrow key aliases
bind = $mainMod,       left,   movefocus, l
bind = $mainMod,       down,   movefocus, d
bind = $mainMod,       up,     movefocus, u
bind = $mainMod,       right,  movefocus, r

# ── Move windows ──────────────────────────────────────────────────────────────
bind = $mainMod SHIFT, H,      movewindow, l
bind = $mainMod SHIFT, J,      movewindow, d
bind = $mainMod SHIFT, K,      movewindow, u
bind = $mainMod SHIFT, L,      movewindow, r

# ── Resize ────────────────────────────────────────────────────────────────────
binde = $mainMod CTRL, H,      resizeactive, -50 0
binde = $mainMod CTRL, J,      resizeactive, 0 50
binde = $mainMod CTRL, K,      resizeactive, 0 -50
binde = $mainMod CTRL, L,      resizeactive, 50 0

# ── Workspaces ────────────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod,       tab,    workspace, e+1
bind = $mainMod SHIFT, tab,    workspace, e-1

# ── Scratchpad ────────────────────────────────────────────────────────────────
bind = $mainMod,       S,      togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, S,      movetoworkspace,        special:scratchpad

# ── Mouse ─────────────────────────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1

# ── Media keys ────────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous

# ── Screenshots ───────────────────────────────────────────────────────────────
bind = ,       Print, exec, grim - | wl-copy
bind = SHIFT,  Print, exec, grim -g "$(slurp)" - | wl-copy

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = float-dolphin
    match:class = ^(dolphin|org.kde.dolphin)$
    float = true
    size = 1100 720
    center = true
}

windowrule {
    name = float-pavucontrol
    match:class = ^pavucontrol$
    float = true
    size = 700 500
    center = true
}

windowrule {
    name = float-calculator
    match:class = ^(gnome-calculator|org.gnome.Calculator)$
    float = true
    center = true
}

windowrule {
    name = float-dialogs
    match:title = ^(Open|Save|Save As|Confirm|Alert|Error|Warning)$
    float = true
    center = true
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# ── Workspace assignments ──────────────────────────────────────────────────────

windowrule {
    name = ws-terminal
    match:class = ^kitty$
    workspace = 1 silent
}

windowrule {
    name = ws-vscode
    match:class = ^code$
    workspace = 2 silent
}

windowrule {
    name = opacity-vscode
    match:class = ^code$
    opacity = 0.88 0.82
}

windowrule {
    name = ws-firefox
    match:class = ^firefox$
    workspace = 3 silent
}

windowrule {
    name = ws-vesktop
    match:class = ^vesktop$
    workspace = 9 silent
}

windowrule {
    name = opacity-vesktop
    match:class = ^vesktop$
    opacity = 0.92 0.86
}

# Apple Music is Firefox — match by title to override the ws-firefox rule above
windowrule {
    name = ws-apple-music
    match:class = ^firefox$
    match:title = Apple Music
    workspace = 10 silent
}
