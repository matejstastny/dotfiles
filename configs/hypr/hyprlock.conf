general {
    hide_cursor      = true
    ignore_empty_input = true
    immediate_render = true
}

background {
    monitor     =
    # Asahi GPU can't screencopy, so color is the actual fallback that renders
    color       = rgba(0f0f17ff)
    path        = /home/starlight/dotfiles/assets/wallpapers/wallpaper.png
    blur_passes = 3
    blur_size   = 6
    brightness  = 0.6
    contrast    = 0.85
    vibrancy    = 0.18
}

label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size   = 72
    font_family = JetBrainsMono Nerd Font Mono
    color       = rgba(e0e0e0ff)
    position    = 0, 120
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +'%A, %B %-d')"
    font_size   = 18
    font_family = JetBrainsMono Nerd Font Mono
    color       = rgba(888899cc)
    position    = 0, 46
    halign      = center
    valign      = center
}

input-field {
    monitor   =
    size      = 280, 48

    outline_thickness = 2
    dots_size         = 0.25
    dots_spacing      = 0.5
    dots_center       = true
    dots_rounding     = -1

    outer_color  = rgba(bb9af7cc)
    inner_color  = rgba(1a1a28ee)
    font_color   = rgba(e0e0e0ff)
    fade_on_empty = true

    # No Pango span — hyprlang treats " as a string delimiter
    placeholder_text = <i>password</i>
    hide_input       = false

    check_color    = rgba(7dcfb6ff)
    fail_color     = rgba(f14c4cff)
    fail_text      = <i>wrong password</i>
    capslock_color = rgba(e5c07bff)

    rounding  = 8
    position  = 0, -20
    halign    = center
    valign    = center
}
