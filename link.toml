# link.toml — symlink targets for `dot link`
# Folders not listed here are symlinked as directories to ~/.config/<folder_name>

# Symlink the whole directory to a custom path instead of ~/.config/<name>
# Format: name = "symlink_path"
[directories]
vesktop = "$HOME/Library/Application Support/vesktop/themes"

# Link each file inside configs/<name>/ individually into the target directory
# Format: name = "target_directory"
[files]
aider = "$HOME"
zsh = "$HOME"
git = "$HOME"
vscode = "$HOME/Library/Application Support/Code/User"
